<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Chunk & Verb Trainer</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            padding: 15px;
            max-width: 650px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            border: none;
            background-color: #dcdde1;
            color: #2f3640;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #34495e;
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            box-sizing: border-box;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .btn-action {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .chunk-block, .verb-block {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        .chunk-header { font-size: 19px; font-weight: bold; color: #2980b9; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .ipa-text { color: #7f8c8d; font-size: 14px; font-style: italic; margin: 3px 0; }
        .meaning-text { color: #27ae60; font-weight: bold; font-size: 16px; margin: 5px 0; }
        .note-text { color: #e67e22; font-size: 13px; margin-bottom: 12px; white-space: pre-line; line-height: 1.4; background: #fff5e6; padding: 8px; border-radius: 6px; }
        
        .sentence-item {
            background: #f8f9fa;
            padding: 10px 12px;
            border-radius: 6px;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-left: 3px solid #3498db;
        }
        .sentence-item.verb-item { border-left: 3px solid #e74c3c; }
        .fr-side { font-weight: 600; color: #2c3e50; font-size: 15px; }
        .en-side { font-size: 13px; color: #7f8c8d; margin-top: 2px; }
        
        .btn-speak-mini {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn-speak-mini:active { transform: scale(0.9); }

        /* Flashcard Styling */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 220px;
            margin: 20px 0;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            cursor: pointer;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .card-front {
            background: white;
            border: 2px solid #3498db;
        }
        .card-back {
            background: #2c3e50;
            color: white;
            transform: rotateY(180deg);
        }
        .card-fr { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
        .card-en { font-size: 20px; font-weight: 500; color: #ecf0f1; }
        
        .card-controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .btn-card {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-again { background-color: #e74c3c; color: white; }
        .btn-good { background-color: #2ecc71; color: white; }
        
        .progress-text { text-align: center; font-weight: bold; margin-top: 10px; color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>📇 French Chunk & Verb Learner</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('input-panel')">📥 Import Data</button>
        <button class="tab-btn" onclick="switchTab('list-panel')">📋 Daily List</button>
        <button class="tab-btn" onclick="switchTab('card-panel')">📇 Flashcards</button>
    </div>

    <!-- 1. Input Panel -->
    <div id="input-panel" class="panel active">
        <div class="chunk-block">
            <h3>Paste Today's ChatGPT Output</h3>
            <textarea id="raw-data" placeholder="Paste the text from ChatGPT here..."></textarea>
            <button class="btn-action" onclick="processData()">⚡ Generate Study Set</button>
        </div>
    </div>

    <!-- 2. List Panel -->
    <div id="list-panel" class="panel">
        <div id="list-container">
            <p style="text-align: center; color: #7f8c8d; padding: 20px;">No data loaded. Go to "Import Data" tab first!</p>
        </div>
    </div>

    <!-- 3. Card Panel -->
    <div id="card-panel" class="panel">
        <div id="card-view-wrapper" style="display: none;">
            <div class="card-container" onclick="toggleCardFlip()">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-front">
                        <div class="card-fr" id="card-front-text">Bonjour</div>
                        <button class="btn-speak-mini" id="btn-card-audio" onclick="event.stopPropagation(); speakCardCurrent()">🔊</button>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-en" id="card-back-text">Hello</div>
                    </div>
                </div>
            </div>
            <div class="progress-text" id="card-progress">Card 1 of 0</div>
            <div class="card-controls">
                <button class="btn-card btn-again" onclick="handleCardScore(false)">❌ Still Hard</button>
                <button class="btn-card btn-good" onclick="handleCardScore(true)">✅ Memorized</button>
            </div>
        </div>
        <div id="card-empty-message" style="text-align: center; color: #7f8c8d; padding: 20px;">
            No data loaded. Go to "Import Data" tab first!
        </div>
    </div>

    <script>
        let globalData = { chunks: [], verbs: [] };
        let flashcardQueue = [];
        let currentCardIndex = 0;

        function switchTab(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(panelId).classList.add('active');
            event.target.classList.add('active');

            if (panelId === 'card-panel') {
                initFlashcards();
            }
        }

        function speakFrench(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                // Clean numbers from the start of text for clean speech
                const cleanText = text.replace(/^\d+\.\s*/, '');
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'fr-FR';
                
                const voices = window.speechSynthesis.getVoices();
                const audrey = voices.find(v => v.lang.toLowerCase().startsWith('fr') && v.name.toLowerCase().includes('audrey'));
                if (audrey) utterance.voice = audrey;
                else {
                    const anyFr = voices.find(v => v.lang.toLowerCase().startsWith('fr'));
                    if (anyFr) utterance.voice = anyFr;
                }
                window.speechSynthesis.speak(utterance);
            }
        }

        // Precision Text Parser for French Chunks & Verbs
        function processData() {
            const rawText = document.getElementById('raw-data').value;
            if (!rawText.trim()) {
                alert("Please paste some text first!");
                return;
            }

            globalData = { chunks: [], verbs: [] };
            flashcardQueue = [];

            // Split text by numbered identifiers or clearly distinct blocks
            const blocks = rawText.split(/\n(?=(?:\d+\.\s+[A-ZÀ-ÿa-z]|J’|Je|Tu|Il|Elle|Nous|Vous|Ils))/g);

            blocks.forEach(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length === 0) return;

                const firstLine = lines[0];

                // Detect Vital Verbs Block
                if (firstLine.match(/^\d+\.\s+\w+/) && (firstLine.includes('(') || firstLine.includes('to '))) {
                    let header = firstLine;
                    let pairs = [];
                    
                    // Parse verb conjugation lines
                    for (let i = 1; i < lines.length; i++) {
                        if (lines[i] && lines[i+1] && !lines[i].match(/^\d/) && !lines[i+1].match(/^\d/)) {
                            // Ensure one is French-ish and next is English-ish
                            if (lines[i+1].toLowerCase().includes('i am') || lines[i+1].toLowerCase().includes('you ') || lines[i+1].toLowerCase().includes('i have') || lines[i+1].toLowerCase().includes('tea') || lines[i+1].toLowerCase().includes('coffee')) {
                                pairs.push({ fr: lines[i], en: lines[i+1] });
                                i++;
                            }
                        }
                    }
                    if (pairs.length > 0) {
                        globalData.verbs.push({ header: header, pairs: pairs });
                    }
                } 
                // Detect Chunk Block
                else if (lines.some(l => l.startsWith('[')) || lines.some(l => l.match(/^\d+\./))) {
                    let frChunk = firstLine;
                    let ipa = lines.find(l => l.startsWith('[')) || '';
                    let katakana = lines.find(l => l.match(/^[\u30a0-\u30ff\u3040-\u309f\u30fc、・\s〜~]+$/)) || '';
                    
                    // Find explanations and notes
                    let noteLines = lines.filter(l => l.startsWith('※') || l.startsWith('•'));
                    let note = noteLines.join('\n');

                    // Find translations (usually lines that don't match sentences or notes)
                    let jpMeaning = lines.find(l => l.startsWith('～') || (l.match(/^[\u4e00-\u9faf\u3040-\u309f]+/) && !l.startsWith('※'))) || '';
                    let enMeaning = lines.find(l => l.toLowerCase().includes('want to') || l.toLowerCase().includes('thought') || (l.match(/^[A-Za-z\s]+～?$/) && !l.startsWith('['))) || '';

                    // Parse sentences clean
                    let sentences = [];
                    for (let i = 0; i < lines.length; i++) {
                        if (lines[i].match(/^\d+\./)) {
                            let frSentence = lines[i];
                            let ipaSentence = '';
                            let enSentence = '';

                            // look ahead for its specific IPA and English lines
                            if (i + 1 < lines.length && lines[i+1].startsWith('[')) {
                                ipaSentence = lines[i+1];
                                if (i + 2 < lines.length && lines[i+2].match(/^[A-Za-z]/) && !lines[i+2].startsWith('[')) {
                                    enSentence = lines[i+2];
                                    i += 2;
                                } else {
                                    i += 1;
                                }
                            } else if (i + 1 < lines.length && lines[i+1].match(/^[A-Za-z]/)) {
                                enSentence = lines[i+1];
                                i += 1;
                            }
                            sentences.push({ fr: frSentence, ipa: ipaSentence, en: enSentence });
                        }
                    }

                    globalData.chunks.push({
                        fr: frChunk,
                        ipa: ipa,
                        katakana: katakana,
                        jp: jpMeaning,
                        en: enMeaning,
                        note: note,
                        sentences: sentences
                    });
                }
            });

            renderListView();
            alert("Success! Your daily list is ready without shifting.");
            switchTab('list-panel');
        }

        function renderListView() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            if (globalData.chunks.length === 0 && globalData.verbs.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #7f8c8d; padding: 20px;">No data loaded yet.</p>';
                return;
            }

            if (globalData.chunks.length > 0) {
                container.innerHTML += '<h2>🧩 Daily Chunks</h2>';
                globalData.chunks.forEach(chunk => {
                    let sHtml = '';
                    chunk.sentences.forEach(s => {
                        sHtml += `
                            <div class="sentence-item">
                                <div style="flex-grow: 1;">
                                    <div class="fr-side">${s.fr}</div>
                                    <div style="font-size:12px; color:#95a5a6; font-style:italic;">${s.ipa}</div>
                                    <div class="en-side">${s.en}</div>
                                </div>
                                <button class="btn-speak-mini" onclick="speakFrench('${s.fr.replace(/'/g, "\\'")}')">🔊</button>
                            </div>
                        `;
                    });

                    container.innerHTML += `
                        <div class="chunk-block">
                            <div class="chunk-header">
                                <span>${chunk.fr}</span>
                                <button class="btn-speak-mini" onclick="speakFrench('${chunk.fr.replace(/'/g, "\\'")}')">🔊</button>
                            </div>
                            <div class="ipa-text">${chunk.ipa} ${chunk.katakana}</div>
                            <div class="meaning-text">${chunk.jp} / ${chunk.en}</div>
                            ${chunk.note ? `<div class="note-text">${chunk.note}</div>` : ''}
                            ${sHtml}
                        </div>
                    `;
                });
            }

            if (globalData.verbs.length > 0) {
                container.innerHTML += '<h2>⚡ Vital Verbs</h2>';
                globalData.verbs.forEach(v => {
                    let pHtml = '';
                    v.pairs.forEach(p => {
                        pHtml += `
                            <div class="sentence-item verb-item">
                                <div style="flex-grow: 1;">
                                    <div class="fr-side">${p.fr}</div>
                                    <div class="en-side">${p.en}</div>
                                </div>
                                <button class="btn-speak-mini" style="background:#e74c3c;" onclick="speakFrench('${p.fr.replace(/'/g, "\\'")}')">🔊</button>
                            </div>
                        `;
                    });
                    container.innerHTML += `
                        <div class="verb-block">
                            <div class="chunk-header" style="color: #e74c3c;">${v.header}</div>
                            ${pHtml}
                        </div>
                    `;
                });
            }
        }

        function initFlashcards() {
            if (globalData.chunks.length === 0 && globalData.verbs.length === 0) {
                document.getElementById('card-view-wrapper').style.display = 'none';
                document.getElementById('card-empty-message').style.display = 'block';
                return;
            }

            document.getElementById('card-view-wrapper').style.display = 'block';
            document.getElementById('card-empty-message').style.display = 'none';

            if (flashcardQueue.length === 0) {
                globalData.chunks.forEach(c => {
                    c.sentences.forEach(s => { if(s.fr && s.en) flashcardQueue.push({ fr: s.fr, en: s.en }); });
                });
                globalData.verbs.forEach(v => {
                    v.pairs.forEach(p => { if(p.fr && p.en) flashcardQueue.push({ fr: p.fr, en: p.en }); });
                });
                
                flashcardQueue.sort(() => Math.random() - 0.5);
                currentCardIndex = 0;
            }

            showCard();
        }

        function showCard() {
            if (flashcardQueue.length === 0 || currentCardIndex >= flashcardQueue.length) {
                document.getElementById('card-front-text').textContent = "🎉 All Done!";
                document.getElementById('card-back-text').textContent = "Excellent progress today!";
                document.getElementById('card-progress').textContent = "Completed!";
                document.getElementById('btn-card-audio').style.display = 'none';
                return;
            }

            document.getElementById('btn-card-audio').style.display = 'inline-flex';
            const card = flashcardQueue[currentCardIndex];
            document.getElementById('card-front-text').textContent = card.fr;
            document.getElementById('card-back-text').textContent = card.en;
            document.getElementById('card-progress').textContent = `Card ${currentCardIndex + 1} of ${flashcardQueue.length}`;
            
            document.getElementById('flashcard').classList.remove('flipped');
            
            setTimeout(() => { speakFrench(card.fr); }, 200);
        }

        function toggleCardFlip() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function speakCardCurrent() {
            if(flashcardQueue[currentCardIndex]) {
                speakFrench(flashcardQueue[currentCardIndex].fr);
            }
        }

        function handleCardScore(isGood) {
            if (currentCardIndex >= flashcardQueue.length) return;

            if (!isGood) {
                const currentCard = flashcardQueue[currentCardIndex];
                flashcardQueue.push(currentCard);
            }
            
            currentCardIndex++;
            showCard();
        }
    </script>
</body>
</html>
