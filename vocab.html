<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Chunk & Verb Trainer</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            padding: 15px;
            max-width: 650px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            border: none;
            background-color: #dcdde1;
            color: #2f3640;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #34495e;
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* Data Input Styling */
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            box-sizing: border-box;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .btn-action {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* List View Styling */
        .chunk-block, .verb-block {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        .chunk-header { font-size: 18px; font-weight: bold; color: #2980b9; display: flex; align-items: center; gap: 8px; }
        .ipa-text { color: #7f8c8d; font-size: 14px; font-style: italic; }
        .meaning-text { color: #27ae60; font-weight: bold; margin: 5px 0; }
        .note-text { color: #e67e22; font-size: 13px; margin-bottom: 10px; }
        
        .sentence-item {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .sentence-item .fr { font-weight: 600; color: #2c3e50; }
        .sentence-item .en { font-size: 13px; color: #7f8c8d; text-align: right; }
        
        .btn-speak-mini {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Flashcard Styling */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 220px;
            margin: 20px 0;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            cursor: pointer;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .card-front {
            background: white;
            border: 2px solid #3498db;
        }
        .card-back {
            background: #2c3e50;
            color: white;
            transform: rotateY(180deg);
        }
        .card-fr { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
        .card-en { font-size: 20px; font-weight: 500; color: #ecf0f1; }
        
        .card-controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .btn-card {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-again { background-color: #e74c3c; color: white; }
        .btn-good { background-color: #2ecc71; color: white; }
        
        .progress-text { text-align: center; font-weight: bold; margin-top: 10px; color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>📇 French Chunk & Verb Learner</h1>
    
    <!-- Navigation Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('input-panel')">📥 Import Data</button>
        <button class="tab-btn" onclick="switchTab('list-panel')">📋 Daily List</button>
        <button class="tab-btn" onclick="switchTab('card-panel')">📇 Flashcards</button>
    </div>

    <!-- 1. Input Panel -->
    <div id="input-panel" class="panel active">
        <div class="chunk-block">
            <h3>Paste Today's ChatGPT Output</h3>
            <p style="font-size: 13px; color: #7f8c8d; margin-top: 0;">Copy and paste the entire response from ChatGPT below.</p>
            <textarea id="raw-data" placeholder="Je pensais que...&#10;[ʒə pɑ̃.sɛ kə]...&#10;1. Je pensais que oui.&#10;..."></textarea>
            <button class="btn-action" onclick="processData()">⚡ Generate Study Set</button>
        </div>
    </div>

    <!-- 2. List Panel -->
    <div id="list-panel" class="panel">
        <div id="list-container">
            <p style="text-align: center; color: #7f8c8d; padding: 20px;">No data loaded. Go to "Import Data" tab first!</p>
        </div>
    </div>

    <!-- 3. Card Panel -->
    <div id="card-panel" class="panel">
        <div id="card-view-wrapper" style="display: none;">
            <div class="card-container" onclick="toggleCardFlip()">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-front">
                        <div class="card-fr" id="card-front-text">Bonjour</div>
                        <button class="btn-speak-mini" id="btn-card-audio" onclick="event.stopPropagation(); speakCardCurrent()">🔊</button>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-en" id="card-back-text">Hello</div>
                    </div>
                </div>
            </div>
            <div class="progress-text" id="card-progress">Card 1 of 0</div>
            <div class="card-controls">
                <button class="btn-card btn-again" onclick="handleCardScore(false)">❌ Still Hard</button>
                <button class="btn-card btn-good" onclick="handleCardScore(true)">✅ Memorized</button>
            </div>
        </div>
        <div id="card-empty-message" style="text-align: center; color: #7f8c8d; padding: 20px;">
            No data loaded. Go to "Import Data" tab first!
        </div>
    </div>

    <script>
        let globalData = { chunks: [], verbs: [] };
        let flashcardQueue = [];
        let currentCardIndex = 0;

        function switchTab(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(panelId).classList.add('active');
            event.target.classList.add('active');

            if (panelId === 'card-panel') {
                initFlashcards();
            }
        }

        // TTS Speaker Function using Audrey/Native iOS French
        function speakFrench(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                
                const voices = window.speechSynthesis.getVoices();
                const audrey = voices.find(v => v.lang.toLowerCase().startsWith('fr') && v.name.toLowerCase().includes('audrey'));
                if (audrey) {
                    utterance.voice = audrey;
                } else {
                    const anyFr = voices.find(v => v.lang.toLowerCase().startsWith('fr'));
                    if (anyFr) utterance.voice = anyFr;
                }
                window.speechSynthesis.speak(utterance);
            }
        }

        // Smart ChatGPT Text Parser
        function processData() {
            const rawText = document.getElementById('raw-data').value;
            if (!rawText.trim()) {
                alert("Please paste some text first!");
                return;
            }

            globalData = { chunks: [], verbs: [] };
            flashcardQueue = [];

            // Split into blocks by double line breaks
            const blocks = rawText.split(/\n\s*\n/);
            
            let currentBlockType = 'chunk'; // fallback

            blocks.forEach(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length === 0) return;

                // Simple Router to detect if block is Verb or Chunk
                const testHeader = lines[0].toLowerCase();
                if (lines.length <= 4 && (testHeader.match(/^\d+\./) && (testHeader.includes('(') || lines.some(l => l.toLowerCase().includes('i am') || l.toLowerCase().includes('have'))))) {
                    currentBlockType = 'verb';
                } else if (lines.some(l => l.startsWith('[') || l.includes('’') || l.match(/^\d+\./))) {
                    currentBlockType = 'chunk';
                }

                if (currentBlockType === 'chunk') {
                    // Expecting Format:
                    // 0: French Chunk
                    // 1: IPA
                    // 2: Katakana
                    // 3: Link / separator or English explanation
                    // ... sentences starting with digits
                    let frChunk = lines[0].replace(/^\d+\.\s*/, '');
                    let ipa = lines.find(l => l.startsWith('[')) || '';
                    let katakana = lines.find(l => l.match(/^[\u30a0-\u30ff\u3040-\u309f\u30fc、・\s〜~]+$/)) || '';
                    let enMeaning = lines.find(l => l.toLowerCase().includes('i thought') || l.match(/[a-zA-Z]/) && !l.startsWith('[') && !l.match(/^\d/)) || '';
                    
                    let sentences = [];
                    lines.forEach(l => {
                        if (l.match(/^\d+\./)) {
                            // It's a sentence line like "1. Je pensais que oui."
                            // Look ahead for its English meaning
                            let cleanFr = l.replace(/^\d+\.\s*/, '');
                            sentences.push({ fr: cleanFr, en: '' });
                        }
                    });

                    // Match English lines to corresponding sentences
                    let sentenceIdx = 0;
                    lines.forEach(l => {
                        if (l.match(/^[a-zA-Z]/) && !l.startsWith('[') && !l.toLowerCase().includes('thought') && sentenceIdx < sentences.length) {
                            if (!sentences[sentenceIdx].fr.toLowerCase().includes(l.toLowerCase())) {
                                sentences[sentenceIdx].en = l;
                                sentenceIdx++;
                            }
                        }
                    });

                    globalData.chunks.push({
                        fr: frChunk, ipa: ipa, katakana: katakana, en: enMeaning, sentences: sentences
                    });

                } else {
                    // Verb Block parsing
                    let header = lines[0];
                    let pairs = [];
                    for(let i=1; i<lines.length; i++) {
                        if (lines[i] && lines[i].match(/[a-zA-Z]/)) {
                            // If it's French, check next line or lines below for English matching
                            if (i + 2 < lines.length && !lines[i].toLowerCase().includes('i ') && !lines[i].toLowerCase().includes('you ')) {
                                // Simple extraction rule
                                pairs.push({ fr: lines[i], en: lines[i+2] || '' });
                                i++;
                            } else if (i + 1 < lines.length) {
                                pairs.push({ fr: lines[i], en: lines[i+1] });
                                i++;
                            }
                        }
                    }
                    globalData.verbs.push({ header: header, pairs: pairs });
                }
            });

            renderListView();
            alert("Success! App updated. Check the 'Daily List' or 'Flashcards' tabs.");
            switchTab('list-panel');
        }

        // Render List (Table View) with Active Audio Buttons
        function renderListView() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            if (globalData.chunks.length === 0 && globalData.verbs.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #7f8c8d; padding: 20px;">No data parsed.</p>';
                return;
            }

            if (globalData.chunks.length > 0) {
                container.innerHTML += '<h2>🧩 Chunks of the Day</h2>';
                globalData.chunks.forEach(chunk => {
                    let sHtml = '';
                    chunk.sentences.forEach(s => {
                        if(!s.fr) return;
                        sHtml += `
                            <div class="sentence-item">
                                <div>
                                    <span class="fr">${s.fr}</span>
                                    <div class="en">${s.en}</div>
                                </div>
                                <button class="btn-speak-mini" onclick="speakFrench('${s.fr.replace(/'/g, "\\'")}')">🔊</button>
                            </div>
                        `;
                    });

                    container.innerHTML += `
                        <div class="chunk-block">
                            <div class="chunk-header">
                                <span>${chunk.fr}</span>
                                <button class="btn-speak-mini" onclick="speakFrench('${chunk.fr.replace(/'/g, "\\'")}')">🔊</button>
                            </div>
                            <div class="ipa-text">${chunk.ipa} ${chunk.katakana}</div>
                            <div class="meaning-text">${chunk.en}</div>
                            ${sHtml}
                        </div>
                    `;
                });
            }

            if (globalData.verbs.length > 0) {
                container.innerHTML += '<h2>⚡ Vital Verbs</h2>';
                globalData.verbs.forEach(v => {
                    let pHtml = '';
                    v.pairs.forEach(p => {
                        if(!p.fr) return;
                        pHtml += `
                            <div class="sentence-item">
                                <div>
                                    <span class="fr">${p.fr}</span>
                                    <div class="en">${p.en}</div>
                                </div>
                                <button class="btn-speak-mini" onclick="speakFrench('${p.fr.replace(/'/g, "\\'")}')">🔊</button>
                            </div>
                        `;
                    });
                    container.innerHTML += `
                        <div class="verb-block">
                            <div class="chunk-header" style="color: #e74c3c;">${v.header}</div>
                            ${pHtml}
                        </div>
                    `;
                });
            }
        }

        // Initialize Flashcards from current list
        function initFlashcards() {
            if (globalData.chunks.length === 0 && globalData.verbs.length === 0) {
                document.getElementById('card-view-wrapper').style.display = 'none';
                document.getElementById('card-empty-message').style.display = 'block';
                return;
            }

            document.getElementById('card-view-wrapper').style.display = 'block';
            document.getElementById('card-empty-message').style.display = 'none';

            if (flashcardQueue.length === 0) {
                // Collect all sentences and verb pairs into the card queue
                globalData.chunks.forEach(c => {
                    c.sentences.forEach(s => { if(s.fr && s.en) flashcardQueue.push({ fr: s.fr, en: s.en }); });
                });
                globalData.verbs.forEach(v => {
                    v.pairs.forEach(p => { if(p.fr && p.en) flashcardQueue.push({ fr: p.fr, en: p.en }); });
                });
                
                // Shuffle cards dynamically
                flashcardQueue.sort(() => Math.random() - 0.5);
                currentCardIndex = 0;
            }

            showCard();
        }

        function showCard() {
            if (flashcardQueue.length === 0 || currentCardIndex >= flashcardQueue.length) {
                document.getElementById('card-front-text').textContent = "🎉 All Done!";
                document.getElementById('card-back-text').textContent = "Excellent work for today!";
                document.getElementById('card-progress').textContent = "Completed!";
                document.getElementById('btn-card-audio').style.display = 'none';
                return;
            }

            document.getElementById('btn-card-audio').style.display = 'inline-flex';
            const card = flashcardQueue[currentCardIndex];
            document.getElementById('card-front-text').textContent = card.fr;
            document.getElementById('card-back-text').textContent = card.en;
            document.getElementById('card-progress').textContent = `Card ${currentCardIndex + 1} of ${flashcardQueue.length}`;
            
            // Reset flip state
            document.getElementById('flashcard').classList.remove('flipped');
            
            // Auto-play pronunciation when card opens
            setTimeout(() => { speakFrench(card.fr); }, 200);
        }

        function toggleCardFlip() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function speakCardCurrent() {
            if(flashcardQueue[currentCardIndex]) {
                speakFrench(flashcardQueue[currentCardIndex].fr);
            }
        }

        function handleCardScore(isGood) {
            if (currentCardIndex >= flashcardQueue.length) return;

            if (!isGood) {
                // If "Still Hard", push the card to the back of the queue to ask again later
                const currentCard = flashcardQueue[currentCardIndex];
                flashcardQueue.push(currentCard);
            }
            
            currentCardIndex++;
            showCard();
        }
    </script>
</body>
</html>
