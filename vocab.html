<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Learning Trainer</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            padding: 15px;
            max-width: 650px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 8px;
            font-weight: bold;
            border: none;
            background-color: #dcdde1;
            color: #2f3640;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            text-align: center;
        }
        .tab-btn.active {
            background-color: #34495e;
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            box-sizing: border-box;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .btn-action {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn-danger {
            width: 100%;
            padding: 8px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            margin-top: 40px;
            opacity: 0.6;
        }
        .btn-danger:hover { opacity: 1; }

        .chunk-block {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        
        .clickable-fr {
            font-size: 20px;
            font-weight: bold;
            color: #2980b9;
            cursor: pointer;
            display: block;
            padding: 4px 0;
        }
        .clickable-fr:active { background-color: #e8f4fd; }

        .ipa-text { color: #7f8c8d; font-size: 14px; font-style: italic; margin: 4px 0; }
        .meaning-text { color: #27ae60; font-weight: bold; font-size: 17px; margin: 6px 0; }
        .note-text { color: #e67e22; font-size: 13px; margin: 10px 0; white-space: pre-line; line-height: 1.4; background: #fff5e6; padding: 10px; border-radius: 6px; }
        
        .accordion-toggle {
            background: #f1f2f6;
            color: #57606f;
            border: none;
            width: 100%;
            padding: 8px;
            text-align: left;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }
        .accordion-content {
            display: none;
            margin-top: 10px;
            padding-left: 5px;
        }
        .accordion-content.open {
            display: block;
        }

        .sentence-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
            border-left: 4px solid #3498db;
        }
        .fr-side-clickable {
            font-weight: 600;
            color: #2c3e50;
            font-size: 15px;
            cursor: pointer;
            display: block;
        }
        .fr-side-clickable:active { background-color: #eee; }
        .en-side { font-size: 13px; color: #7f8c8d; margin-top: 4px; }

        .item-footer-controls {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 10px;
            padding-top: 5px;
        }
        .btn-emoji-only {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        /* Flashcard Styling */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 220px;
            margin: 20px 0;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            cursor: pointer;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .card-front { background: white; border: 2px solid #3498db; }
        .card-back { background: #2c3e50; color: white; transform: rotateY(180deg); }
        .card-fr { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; line-height: 1.3; }
        .card-en { font-size: 19px; font-weight: 500; color: #ecf0f1; line-height: 1.3; }
        
        .card-controls { display: flex; gap: 15px; margin-top: 15px; }
        .btn-card { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-again { background-color: #e74c3c; color: white; }
        .btn-good { background-color: #2ecc71; color: white; }
        
        .progress-text { text-align: center; font-weight: bold; margin-top: 10px; color: #7f8c8d; }
        .total-counter { text-align: center; font-size: 13px; color: #7f8c8d; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📇 French Study Hub</h1>
    
    <div class="total-counter" id="total-database-counter">Loaded: 0 Chunks | 0 Verbs</div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('input-panel')">📥 Add Data</button>
        <button class="tab-btn" onclick="switchTab('list-panel')">📋 Daily Chunks</button>
        <button class="tab-btn" onclick="switchTab('verb-panel')">🔤 Daily Verbs</button>
        <button class="tab-btn" onclick="switchTab('card-panel')">📇 Flashcards (All)</button>
    </div>

    <div id="input-panel" class="panel active">
        <div class="chunk-block">
            <h3>Paste ChatGPT Formatted Output</h3>
            <p style="font-size: 13px; color: #7f8c8d; margin-top: 0;">Supports [CHUNK] or [VERB] tags with [EX] sentences!</p>
            <textarea id="raw-data" placeholder="Paste tagged text here..."></textarea>
            <button class="btn-action" onclick="processWithTags()">⚡ Add to My Study Set</button>
            <button class="btn-danger" onclick="clearAllData()">🗑️ Clear All Saved Data</button>
        </div>
    </div>

    <div id="list-panel" class="panel">
        <div id="list-container"></div>
    </div>

    <div id="verb-panel" class="panel">
        <div id="verb-container"></div>
    </div>

    <div id="card-panel" class="panel">
        <div id="card-view-wrapper" style="display: none;">
            <div class="card-container" onclick="toggleCardFlip()">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-front">
                        <div class="card-fr" id="card-front-text" onclick="event.stopPropagation(); speakCardCurrent();">Bonjour</div>
                        <div style="font-size: 11px; color:#95a5a6; margin-top: 10px;">タップでフリップ / 文字タップで再生</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-en" id="card-back-text">Hello</div>
                    </div>
                </div>
            </div>
            <div class="progress-text" id="card-progress">Card 1 of 0</div>
            <div class="card-controls">
                <button class="btn-card btn-again" onclick="handleCardScore(false)">❌ Still Hard</button>
                <button class="btn-card btn-good" onclick="handleCardScore(true)">✅ Memorized</button>
            </div>
        </div>
        <div id="card-empty-message" style="text-align: center; color: #7f8c8d; padding: 20px;">
            No examples found for testing. Add data first!
        </div>
    </div>

    <script>
        let globalData = { chunks: [], verbs: [] }; 
        let flashcardQueue = [];
        let currentCardIndex = 0;

        window.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
            renderListView();
            renderVerbView();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
        });

        function switchTab(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(panelId).classList.add('active');
            event.target.classList.add('active');

            if (panelId === 'card-panel') {
                initFlashcards();
            }
        }

        function speakFrench(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 
            let cleanText = text.trim();
            if (!cleanText) return;

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'fr-FR';
            utterance.rate = 0.88; 

            const voices = window.speechSynthesis.getVoices();
            const amelie = voices.find(v => {
                const n = v.name.toLowerCase();
                return n.includes('amélie') || n.includes('amelie');
            });
            if (amelie) utterance.voice = amelie;
            window.speechSynthesis.speak(utterance);
        }

        function speakEnglish(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.95;

            const voices = window.speechSynthesis.getVoices();
            const samanthas = voices.filter(v => v.name.toLowerCase().includes('samantha'));
            if (samanthas.length > 0) utterance.voice = samanthas[samanthas.length - 1];
            window.speechSynthesis.speak(utterance);
        }

        function loadSavedData() {
            const saved = localStorage.getItem('french_hub_tagged_data_v2');
            if (saved) {
                try {
                    globalData = JSON.parse(saved);
                    if (!globalData.chunks) globalData.chunks = [];
                    if (!globalData.verbs) globalData.verbs = [];
                } catch(e) {
                    globalData = { chunks: [], verbs: [] };
                }
            }
            updateCounters();
        }

        function saveData() {
            localStorage.setItem('french_hub_tagged_data_v2', JSON.stringify(globalData));
            updateCounters();
        }

        function updateCounters() {
            document.getElementById('total-database-counter').textContent = 
                `Loaded: ${globalData.chunks.length} Chunks | ${globalData.verbs.length} Verbs in storage`;
        }

        function clearAllData() {
            if(confirm("Are you sure you want to delete ALL data?")) {
                localStorage.removeItem('french_hub_tagged_data_v2');
                globalData = { chunks: [], verbs: [] };
                flashcardQueue = [];
                updateCounters();
                renderListView();
                renderVerbView();
                alert("Cleared!");
            }
        }

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
        }

        function deleteItem(type, index) {
            if(confirm("Delete this entire set including its examples?")) {
                if (type === 'chunk') globalData.chunks.splice(index, 1);
                if (type === 'verb') globalData.verbs.splice(index, 1);
                saveData();
                renderListView();
                renderVerbView();
                flashcardQueue = [];
            }
        }

        function editItemSet(type, index) {
            const set = (type === 'chunk') ? globalData.chunks[index] : globalData.verbs[index];
            
            const newFr = prompt("✏️ Edit MAIN Text:", set.mainFr);
            if (newFr === null) return;
            const newEn = prompt("✏️ Edit MAIN Translation:", set.mainEn);
            if (newEn === null) return;
            
            set.mainFr = newFr.trim();
            set.mainEn = newEn.trim();

            set.examples.forEach((ex, idx) => {
                const exFr = prompt(`✏️ Edit [Example ${idx+1}] French:`, ex.fr);
                if (exFr !== null) ex.fr = exFr.trim();
                const exEn = prompt(`✏️ Edit [Example ${idx+1}] English:`, ex.en);
                if (exEn !== null) ex.en = exEn.trim();
            });

            saveData();
            if (type === 'chunk') renderListView();
            if (type === 'verb') renderVerbView();
            flashcardQueue = [];
        }

        /* 🌟 チャンクと動詞を賢く振り分けるパースエンジン */
        function processWithTags() {
            const rawText = document.getElementById('raw-data').value;
            if (!rawText.trim()) return;

            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            let chunkAdded = 0;
            let verbAdded = 0;
            let currentItem = null;
            let currentType = null; // 'chunk' or 'verb'

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                // CHUNK 検出
                if (line.toUpperCase().startsWith('[CHUNK]')) {
                    if (currentItem) saveCurrentItem(currentItem, currentType);
                    currentType = 'chunk';
                    chunkAdded++;
                    currentItem = createNewItemStructure(line.replace(/^\[CHUNK\]\s*/i, ''), lines, i);
                    continue;
                }

                // VERB 検出
                if (line.toUpperCase().startsWith('[VERB]')) {
                    if (currentItem) saveCurrentItem(currentItem, currentType);
                    currentType = 'verb';
                    verbAdded++;
                    currentItem = createNewItemStructure(line.replace(/^\[VERB\]\s*/i, ''), lines, i);
                    continue;
                }

                if (!currentItem) continue;

                // 例文検出
                if (line.toUpperCase().startsWith('[EX]')) {
                    let exFr = line.replace(/^\[EX\]\s*/i, '');
                    let exIpa = (lines[i+1] && lines[i+1].startsWith('[')) ? lines[i+1] : '';
                    let exEnIdx = (lines[i+1] && lines[i+1].startsWith('[')) ? i + 2 : i + 1;
                    let exEn = lines[exEnIdx] || '';

                    currentItem.examples.push({ fr: exFr, ipa: exIpa, en: exEn });

                    if (lines[i+1] && lines[i+1].startsWith('[')) i++;
                    i++; 
                    continue;
                }

                // メモ・解説の蓄積
                if (line !== currentItem.mainFr && line !== currentItem.mainIpa && line !== currentItem.mainEn) {
                    if (!line.startsWith('[')) {
                        currentItem.explanation = currentItem.explanation ? (currentItem.explanation + '\n' + line) : line;
                    }
                }
            }

            if (currentItem) saveCurrentItem(currentItem, currentType);

            saveData();
            renderListView();
            renderVerbView();
            document.getElementById('raw-data').value = '';
            alert(`Successfully loaded:\n+ ${chunkAdded} Chunks\n+ ${verbAdded} Verbs`);
            switchTab(chunkAdded > 0 ? 'list-panel' : 'verb-panel');
        }

        function createNewItemStructure(mainText, lines, i) {
            let item = {
                mainFr: mainText,
                mainIpa: (lines[i+1] && lines[i+1].startsWith('[')) ? lines[i+1] : '',
                mainEn: '',
                explanation: '',
                examples: []
            };
            let nextIdx = (lines[i+1] && lines[i+1].startsWith('[')) ? i + 2 : i + 1;
            if (lines[nextIdx] && !lines[nextIdx].startsWith('[') && !lines[nextIdx].startsWith('※') && !lines[nextIdx].startsWith('•')) {
                item.mainEn = lines[nextIdx];
            }
            return item;
        }

        function saveCurrentItem(item, type) {
            if (type === 'chunk') {
                if (!globalData.chunks.some(c => c.mainFr === item.mainFr)) globalData.chunks.push(item);
            } else if (type === 'verb') {
                if (!globalData.verbs.some(v => v.mainFr === item.mainFr)) globalData.verbs.push(item);
            }
        }

        function renderListView() {
            renderGenericView('list-container', globalData.chunks, 'chunk');
        }

        function renderVerbView() {
            renderGenericView('verb-container', globalData.verbs, 'verb');
        }

        function renderGenericView(containerId, dataset, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (dataset.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: #7f8c8d; padding: 20px;">No ${type}s found. Paste data inside the "Add Data" tab!</p>`;
                return;
            }

            dataset.forEach((item, index) => {
                let safeMainFr = item.mainFr.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                let examplesHtml = '';
                item.examples.forEach((ex) => {
                    let safeExFr = ex.fr.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    examplesHtml += `
                        <div class="sentence-item">
                            <div class="fr-side-clickable" onclick="speakFrench('${safeExFr}')">${ex.fr}</div>
                            ${ex.ipa ? `<div class="ipa-text" style="font-size:12px;">${ex.ipa}</div>` : ''}
                            <div class="en-side">${ex.en}</div>
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div class="chunk-block">
                        <div class="clickable-fr" onclick="speakFrench('${safeMainFr}')">${item.mainFr}</div>
                        ${item.mainIpa ? `<div class="ipa-text">${item.mainIpa}</div>` : ''}
                        ${item.mainEn ? `<div class="meaning-text">${item.mainEn}</div>` : ''}
                        ${item.explanation ? `<div class="note-text">${item.explanation}</div>` : ''}
                        
                        <button class="accordion-toggle" onclick="toggleAccordion('${type}-examples-${index}')">
                            <span>📄 例文・活用 (${item.examples.length}個) を表示 / 非表示</span>
                            <span>▼</span>
                        </button>
                        
                        <div class="accordion-content" id="${type}-examples-${index}">
                            ${examplesHtml || '<p style="color:#95a5a6; font-size:12px;">No examples available.</p>'}
                        </div>

                        <div class="item-footer-controls">
                            <button class="btn-emoji-only" onclick="editItemSet('${type}', ${index})">✏️</button>
                            <button class="btn-emoji-only" onclick="deleteItem('${type}', ${index})">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        /* 🌟 チャンクと動詞のすべての例文をシャッフルして一括テスト */
        function initFlashcards() {
            document.getElementById('card-view-wrapper').style.display = 'block';
            document.getElementById('card-empty-message').style.display = 'none';

            if (flashcardQueue.length === 0) {
                let allExamples = [];

                // チャンクの例文を収集
                globalData.chunks.forEach(chunk => {
                    chunk.examples.forEach(ex => { if (ex.fr && ex.en) allExamples.push({ fr: ex.fr, en: ex.en }); });
                });

                // 動詞の例文を収集
                globalData.verbs.forEach(verb => {
                    verb.examples.forEach(ex => { if (ex.fr && ex.en) allExamples.push({ fr: ex.fr, en: ex.en }); });
                });

                if (allExamples.length === 0) {
                    document.getElementById('card-view-wrapper').style.display = 'none';
                    document.getElementById('card-empty-message').style.display = 'block';
                    return;
                }

                flashcardQueue = allExamples;
                flashcardQueue.sort(() => Math.random() - 0.5);
                currentCardIndex = 0;
            }
            showCard();
        }

        function showCard() {
            if (flashcardQueue.length === 0 || currentCardIndex >= flashcardQueue.length) {
                document.getElementById('card-front-text').textContent = "🎉 Training Completed!";
                document.getElementById('card-back-text').textContent = "Excellent! You finished all shuffled cards!";
                document.getElementById('card-progress').textContent = "Completed!";
                return;
            }

            const card = flashcardQueue[currentCardIndex];
            document.getElementById('card-front-text').textContent = card.fr;
            document.getElementById('card-back-text').textContent = card.en;
            document.getElementById('card-progress').textContent = `Card ${currentCardIndex + 1} of ${flashcardQueue.length}`;
            
            document.getElementById('flashcard').classList.remove('flipped');
            
            setTimeout(() => { speakFrench(card.fr); }, 300);
        }

        function toggleCardFlip() {
            const fc = document.getElementById('flashcard');
            fc.classList.toggle('flipped');
            
            if (fc.classList.contains('flipped') && currentCardIndex < flashcardQueue.length) {
                const enText = flashcardQueue[currentCardIndex].en;
                if (enText && enText.match(/[A-Za-z]/)) {
                    setTimeout(() => { speakEnglish(enText); }, 200);
                }
            }
        }

        function speakCardCurrent() {
            if(flashcardQueue[currentCardIndex]) {
                speakFrench(flashcardQueue[currentCardIndex].fr);
            }
        }

        function handleCardScore(isGood) {
            if (currentCardIndex >= flashcardQueue.length) return;

            if (!isGood) {
                const currentCard = flashcardQueue[currentCardIndex];
                flashcardQueue.push(currentCard);
            }
            
            currentCardIndex++;
            showCard();
        }
    </script>
</body>
</html>
