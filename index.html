<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Reading Trainer (YouGlish Integration)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 20px;
            max-width: 650px;
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; margin-top: 50px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-top: 0; margin-bottom: 25px; }
        
        /* ☰ Top Menu Bar */
        .top-bar {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 100;
        }
        .btn-menu {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            min-width: auto;
        }

        /* 📁 Sidebar Layout */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; /* 最初は隠れている */
            width: 280px;
            height: 100%;
            background-color: #2c3e50;
            color: white;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
            transition: left 0.3s ease;
            z-index: 999;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open {
            left: 0; /* 画面内に現れる */
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4b6584;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .sidebar-header h3 { margin: 0; font-size: 18px; }
        .btn-close {
            background: none;
            border: none;
            color: #a5b1c2;
            font-size: 20px;
            cursor: pointer;
            min-width: auto;
            padding: 0;
        }
        
        /* 📜 History List Item Styling */
        .history-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .history-item {
            background: #34495e;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .history-item:hover { background: #4b6584; }
        .history-text {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
            flex: 1;
        }
        .btn-delete-history {
            background: none;
            border: none;
            color: #fc5c65;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            min-width: auto;
        }
        .btn-delete-history:hover { color: #ff7675; }

        /* Sidebar Overlay overlay */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 998;
        }
        .sidebar-overlay.show { display: block; }

        /* Main App Cards */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .lang-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .lang-radio {
            display: none;
        }
        .lang-label {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .lang-radio:checked + .lang-label {
            border-color: #34495e;
            background-color: #34495e;
            color: white;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            resize: vertical;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            min-width: 140px;
        }
        button:active { transform: scale(0.98); }
        .btn-play { background-color: #3498db; color: white; }
        .btn-stop-tts { background-color: #95a5a6; color: white; }
        .btn-youglish { background-color: #f1c40f; color: #2c3e50; }
        .btn-start { background-color: #2ecc71; color: white; }
        .btn-stop { background-color: #e74c3c; color: white; }
        .btn-play-voice { background-color: #9b59b6; color: white; }
        .btn-save-hist { background-color: #e67e22; color: white; width: 100%; margin-top: 5px; }
        button:disabled { background-color: #bdc3c7; color: #7f8c8d; cursor: not-allowed; transform: none; }
        
        .stats {
            display: flex;
            justify-content: space-between;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
        }
        .result-wpm { color: #e67e22; font-size: 1.2em; }
        audio { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-menu" onclick="toggleSidebar(true)">☰ Saved List</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>📁 Saved List</h3>
            <button class="btn-close" onclick="toggleSidebar(false)">✕</button>
        </div>
        <ul class="history-list" id="history-container">
            </ul>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

    <h1>🗣️ Reading Trainer Pro</h1>
    <p class="subtitle">English & French Practice with YouGlish Integration</p>

    <div class="card">
        <h3>1. Select Language & Enter Text</h3>
        
        <div class="lang-selector">
            <input type="radio" id="lang-en" name="language" value="en" class="lang-radio" checked>
            <label for="lang-en" class="lang-label">🇺🇸 English</label>

            <input type="radio" id="lang-fr" name="language" value="fr" class="lang-radio">
            <label for="lang-fr" class="lang-label">🇫🇷 French (Français)</label>
        </div>

        <textarea id="text-input" placeholder="Type or paste your text here..."></textarea>
        
        <button class="btn-save-hist" id="btn-save-hist">💾 Save Current Text to List</button>
        
        <div class="btn-group">
            <button class="btn-play" id="btn-listen">🔊 Listen to Model</button>
            <button class="btn-stop-tts" id="btn-stop-tts">⏸️ Pause / Resume</button>
            <button class="btn-youglish" id="btn-yg">📺 Search Selected Word on YouGlish</button>
        </div>
    </div>

    <div class="card">
        <h3>2. Record & Measure Your Reading</h3>
        <p>Click "Start" to begin reading aloud, and click "Stop" when you are finished.</p>
        
        <div class="btn-group">
            <button class="btn-start" id="btn-start">▶️ Start (Record)</button>
            <button class="btn-stop" id="btn-stop" disabled>⏹️ Stop (Finish)</button>
        </div>

        <div class="stats">
            <div>Words: <span id="word-count">0</span> words</div>
            <div>Time: <span id="timer">0.0</span> sec</div>
            <div class="result-wpm">WPM: <span id="wpm-result">0</span></div>
        </div>

        <div class="btn-group" style="margin-top: 15px;">
            <button class="btn-play-voice" id="btn-play-voice" disabled>▶️ Play Your Voice</button>
        </div>
        <audio id="audio-playback" playsinline></audio>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const btnListen = document.getElementById('btn-listen');
        const btnStopTts = document.getElementById('btn-stop-tts');
        const btnYg = document.getElementById('btn-yg');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnPlayVoice = document.getElementById('btn-play-voice');
        const btnSaveHist = document.getElementById('btn-save-hist');
        const wordCountSpan = document.getElementById('word-count');
        const timerSpan = document.getElementById('timer');
        const wpmResultSpan = document.getElementById('wpm-result');
        const audioPlayback = document.getElementById('audio-playback');
        const historyContainer = document.getElementById('history-container');

        let startTime;
        let timerInterval;
        let mediaRecorder;
        let audioChunks = [];
        let selectedTextViaTap = "";
        
        // 💾 履歴データアレイ
        let savedHistoryArr = [];

        window.addEventListener('DOMContentLoaded', () => {
            loadSavedTrainerData();
            renderHistoryMenu();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
        });

        // 📁 サイドバーの開閉
        function toggleSidebar(open) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (open) {
                sidebar.classList.add('open');
                overlay.classList.add('show');
            } else {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            }
        }

        // テキスト入力時のリアルタイム最新セーブ
        textInput.addEventListener('input', saveTrainerData);

        function saveTrainerData() {
            localStorage.setItem('reading_trainer_text', textInput.value);
            localStorage.setItem('reading_trainer_lang', getSelectedLanguage());
        }

        function loadSavedTrainerData() {
            const savedText = localStorage.getItem('reading_trainer_text');
            const savedLang = localStorage.getItem('reading_trainer_lang');
            const historySaved = localStorage.getItem('reading_trainer_history_list');

            if (savedText !== null) textInput.value = savedText;
            if (savedLang !== null) {
                const targetRadio = document.querySelector(`input[name="language"][value="${savedLang}"]`);
                if (targetRadio) targetRadio.checked = true;
            }
            if (historySaved !== null) {
                try {
                    savedHistoryArr = JSON.parse(historySaved);
                } catch(e) {
                    savedHistoryArr = [];
                }
            }
        }

        // 💾 履歴リストに現在の内容を追加
        btnSaveHist.addEventListener('click', () => {
            const currentText = textInput.value.trim();
            if (!currentText) {
                alert("Please enter text first before saving!");
                return;
            }
            const currentLang = getSelectedLanguage();

            // 新規アイテム追加
            savedHistoryArr.push({
                text: currentText,
                lang: currentLang,
                timestamp: Date.now()
            });

            localStorage.setItem('reading_trainer_history_list', JSON.stringify(savedHistoryArr));
            renderHistoryMenu();
            alert("Saved to list successfully!");
        });

        // 📜 履歴リストを描画
        function renderHistoryMenu() {
            historyContainer.innerHTML = '';
            if (savedHistoryArr.length === 0) {
                historyContainer.innerHTML = '<p style="font-size:12px; color:#a5b1c2; text-align:center;">No saved list items.</p>';
                return;
            }

            savedHistoryArr.forEach((item, index) => {
                const flag = item.lang === 'en' ? '🇺🇸' : '🇫🇷';
                const previewText = item.text.substring(0, 24) + (item.text.length > 24 ? '...' : '');

                const li = document.createElement('li');
                li.className = 'history-item';
                li.onclick = () => selectHistoryItem(index);

                li.innerHTML = `
                    <div class="history-text">${flag} ${previewText}</div>
                    <button class="btn-delete-history" onclick="event.stopPropagation(); deleteHistoryItem(${index});">🗑️</button>
                `;
                historyContainer.appendChild(li);
            });
        }

        // 📁 履歴タップで復元（再入力）
        function selectHistoryItem(index) {
            const item = savedHistoryArr[index];
            if (item) {
                textInput.value = item.text;
                const targetRadio = document.querySelector(`input[name="language"][value="${item.lang}"]`);
                if (targetRadio) targetRadio.checked = true;
                
                saveTrainerData(); // メインスロットのセーブデータも更新
                toggleSidebar(false); // サイドバーを閉じる
            }
        }

        // 🗑️ 履歴を個別に削除
        function deleteHistoryItem(index) {
            if (confirm("Delete this saved item from your list?")) {
                savedHistoryArr.splice(index, 1);
                localStorage.setItem('reading_trainer_history_list', JSON.stringify(savedHistoryArr));
                renderHistoryMenu();
            }
        }

        textInput.addEventListener('mouseup', saveSelection);
        textInput.addEventListener('touchend', saveSelection);
        function saveSelection() {
            selectedTextViaTap = textInput.value.substring(textInput.selectionStart, textInput.selectionEnd);
        }

        document.querySelectorAll('input[name="language"]').forEach(radio => {
            radio.addEventListener('change', () => {
                selectedTextViaTap = "";
                saveTrainerData();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.getVoices(); 
                }
            });
        });

        function getSelectedLanguage() {
            return document.querySelector('input[name="language"]:checked').value;
        }

        // 1. TTS Control (Samantha & Amélie Perfect Lock)
        btnListen.addEventListener('click', () => {
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.paused) {
                    window.speechSynthesis.resume();
                    return;
                }
                
                window.speechSynthesis.cancel();
                if (!textInput.value.trim()) return;

                const utterance = new SpeechSynthesisUtterance(textInput.value);
                const currentLang = getSelectedLanguage();
                
                utterance.lang = currentLang === 'en' ? 'en-US' : 'fr-FR';
                utterance.rate = 0.95; 

                const allVoices = window.speechSynthesis.getVoices();
                
                if (currentLang === 'fr') {
                    const amelie = allVoices.find(v => {
                        const n = v.name.toLowerCase();
                        return n.includes('amélie') || n.includes('amelie');
                    });
                    if (amelie) {
                        utterance.voice = amelie;
                    } else {
                        const cleanFr = allVoices.filter(v => v.lang.toLowerCase().startsWith('fr') && !v.name.toLowerCase().includes('shelley'));
                        if (cleanFr.length > 0) utterance.voice = cleanFr[0];
                    }
                } else if (currentLang === 'en') {
                    const samanthas = allVoices.filter(v => v.name.toLowerCase().includes('samantha'));
                    
                    if (samanthas.length > 0) {
                        utterance.voice = samanthas[samanthas.length - 1];
                    } else {
                        const cleanEn = allVoices.filter(v => {
                            const n = v.name.toLowerCase();
                            return v.lang.toLowerCase().startsWith('en') && 
                                   !n.includes('rocko') && !n.includes('shelley') && 
                                   !n.includes('grandma') && !n.includes('grandpa') && 
                                   !n.includes('jester') && !n.includes('bad news');
                        });
                        if (cleanEn.length > 0) utterance.voice = cleanEn[0];
                    }
                }

                window.speechSynthesis.speak(utterance);
            }
        });

        btnStopTts.addEventListener('click', () => {
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.speaking) {
                    if (window.speechSynthesis.paused) {
                        window.speechSynthesis.resume();
                    } else {
                        window.speechSynthesis.pause();
                    }
                }
            }
        });

        // 2. YouGlish Integration
        btnYg.addEventListener('click', () => {
            let selectedText = window.getSelection().toString().trim();
            if (!selectedText) selectedText = selectedTextViaTap.trim();
            const currentLang = getSelectedLanguage();

            if (!selectedText) {
                alert('Please highlight/select a word inside the text box first!');
                return;
            }

            const langParam = currentLang === 'en' ? 'english' : 'french';
            window.open(`https://youglish.com/pronounce/${encodeURIComponent(selectedText)}/${langParam}`, '_blank');
        });

        // 3. Start Recording
        btnStart.addEventListener('click', async () => {
            audioChunks = [];
            btnPlayVoice.disabled = true;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                let options = { mimeType: 'audio/mp4' };
                if (!MediaRecorder.isTypeSupported('audio/mp4')) {
                    options = { mimeType: 'audio/webm' };
                }

                mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    audioPlayback.src = URL.createObjectURL(audioBlob);
                    audioPlayback.load();
                    btnPlayVoice.disabled = false;
                };

                mediaRecorder.start(10);
                startTime = performance.now();
                
                timerInterval = setInterval(() => {
                    const elapsed = (performance.now() - startTime) / 1000;
                    timerSpan.textContent = elapsed.toFixed(1);
                }, 100);

                btnStart.disabled = true;
                btnStop.disabled = false;
                textInput.disabled = true;

            } catch (err) {
                alert('Microphone access denied or not found.');
            }
        });

        // 4. Stop Recording
        btnStop.addEventListener('click', () => {
            clearInterval(timerInterval);
            const totalTimeSeconds = (performance.now() - startTime) / 1000;
            timerSpan.textContent = totalTimeSeconds.toFixed(1);

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }

            const text = textInput.value.trim();
            const currentLang = getSelectedLanguage();
            let wordCount = 0;

            if (text !== "") {
                if (currentLang === 'fr') {
                    wordCount = text.replace(/['’\-–]/g, ' ').split(/\s+/).length;
                } else {
                    wordCount = text.split(/\s+/).length;
                }
            }
            
            wordCountSpan.textContent = wordCount;
            wpmResultSpan.textContent = (wordCount > 0 && totalTimeSeconds > 0) ? Math.round((wordCount / totalTimeSeconds) * 60) : 0;

            btnStart.disabled = false;
            btnStop.disabled = true;
            textInput.disabled = false;
        });

        // 5. Play Voice Button
        btnPlayVoice.addEventListener('click', () => {
            if (audioPlayback.src) {
                audioPlayback.muted = false;
                audioPlayback.volume = 1.0;
                audioPlayback.play().catch(err => alert("Playback failed, try recording again."));
            }
        });

        function loadVoicesForced() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
        }
        loadVoicesForced();
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = loadVoicesForced;
        }
    </script>
</body>
</html>
